<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Text to Video Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white">

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // आपकी असली चाबी यहाँ सुरक्षित सेट है
    const REPLICATE_API_KEY = "r8_ToE5grVMoVwb69N6mMP7RiWnXdNsOyM16ymHX";

    const Sidebar = () => (
      <div className="hidden lg:flex fixed left-0 top-0 h-screen w-64 bg-gray-900 border-r border-gray-800 flex-col p-6">
        <div className="flex items-center space-x-3 mb-10">
          <div className="w-10 h-10 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/30">
            <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 002-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
          </div>
          <div>
            <h1 className="font-bold text-lg bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">VideoGen AI</h1>
            <p className="text-xs text-gray-500 font-medium">Text to Video Studio</p>
          </div>
        </div>
        <nav className="flex-1 space-y-2">
          <a href="#" className="flex items-center space-x-3 bg-gradient-to-r from-purple-500/10 to-pink-500/10 text-purple-400 p-4 rounded-2xl border border-purple-500/20 font-medium">
            <span>Studio</span>
          </a>
        </nav>
      </div>
    );

    const VideoPreview = ({ isGenerating, videoUrl, statusText }) => {
      return (
        <div className="bg-gradient-to-br from-gray-800/40 to-gray-900/40 backdrop-blur-xl rounded-3xl p-6 border border-gray-700/40 shadow-2xl h-full flex flex-col justify-between">
          <h3 className="text-lg font-semibold mb-6 flex items-center">
            <span className="w-2 h-2 bg-purple-500 rounded-full mr-2"></span>
            Video Preview
          </h3>
          <div className="flex-1 bg-black/40 rounded-2xl border border-gray-800 flex items-center justify-center min-h-[350px] relative overflow-hidden group">
            {videoUrl ? (
              <video src={videoUrl} controls className="w-full h-full object-contain rounded-2xl" autoPlay loop />
            ) : isGenerating ? (
              <div className="text-center p-6 z-10 animate-pulse">
                <div className="w-16 h-16 bg-gradient-to-tr from-orange-400 to-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-500/20">
                  <svg className="w-8 h-8 text-white animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18" />
                  </svg>
                </div>
                <p className="font-medium text-orange-400">{statusText || "AI is crafting your video..."}</p>
                <p className="text-xs text-gray-400 mt-2">इसमें थोड़ा समय लग सकता है, कृपया इंतज़ार करें।</p>
              </div>
            ) : (
              <div className="text-center text-gray-500 p-6">
                <svg className="w-16 h-16 mx-auto mb-4 opacity-40 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p className="text-center text-sm mt-2 text-gray-300">No video generated yet</p>
                <p className="text-xs opacity-75">Enter a description to create your video</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    const PromptInput = ({ prompt, onPromptChange, onGenerate, isGenerating }) => {
      const [charCount, setCharCount] = useState(prompt.length);

      const handleInput = (e) => {
        const value = e.target.value;
        onPromptChange(value);
        setCharCount(value.length);
      };

      return (
        <div className="bg-gradient-to-br from-gray-800/50 to-gray-900/50 backdrop-blur-xl rounded-3xl p-8 border border-gray-700/50 shadow-2xl">
          <h3 className="text-lg font-semibold mb-6 flex items-center">
            <span className="w-2 h-2 bg-emerald-400 rounded-full mr-2"></span>
            Video Description
          </h3>
          <div className="space-y-4">
            <textarea
              value={prompt}
              onChange={handleInput}
              disabled={isGenerating}
              placeholder="Describe the video you want to create... e.g., 'A majestic dragon flying over mountains'"
              className="w-full h-32 p-6 bg-gray-900/50 border border-gray-600/50 rounded-2xl focus:ring-2 focus:ring-purple-500/50 focus:border-transparent resize-vertical text-lg placeholder-gray-400 transition-all duration-200 text-white"
              maxLength={500}
            />
            <div className="flex justify-between items-center text-sm text-gray-400">
              <div className="flex items-center space-x-2">
                <label className="flex items-center space-x-2 cursor-pointer">
                  <input type="checkbox" defaultChecked className="w-4 h-4 text-purple-500 rounded focus:ring-purple-500 bg-gray-800 border-gray-700" />
                  <span>High Quality Mode</span>
                </label>
              </div>
              <span>{charCount}/500</span>
            </div>
            <button
              onClick={onGenerate}
              disabled={isGenerating}
              className={`w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold py-4 px-8 rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center space-x-3 text-lg cursor-pointer ${isGenerating ? 'opacity-50 cursor-not-allowed' : ''}`}
            >
              <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span>{isGenerating ? "Processing..." : "Generate Live Video"}</span>
            </button>
          </div>
        </div>
      );
    };

    const MainApp = () => {
      const [prompt, setPrompt] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);
      const [videoUrl, setVideoUrl] = useState('');
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [statusText, setStatusText] = useState('');

      const PROXY_URL = "https://cors-anywhere.herokuapp.com/";

      const handleGenerate = async () => {
        if (!prompt.trim()) return;

        setIsGenerating(true);
        setVideoUrl('');
        setStatusText('Connecting to Replicate AI via Proxy...');

        try {
          // ✅ यहाँ हमने पूरी तरह वर्किंग Minimax टेक्स्ट-टू-वीडियो मॉडल सेट कर दिया है
          const createResponse = await fetch(`${PROXY_URL}https://api.replicate.com/v1/predictions`, {
            method: 'POST',
            headers: {
              'Authorization': `Token ${REPLICATE_API_KEY}`,
              'Content-Type': 'application/json',
              'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({
              version: "a22519194ec670172e68407481878b66804da65bc4bc54fa40b90494cfba042f", 
              input: { prompt: prompt }
            })
          });

          if (createResponse.status === 403) {
            throw new Error("Proxy access expired. कृपया दुबारा 'https://cors-anywhere.herokuapp.com/corsdemo' पर जाकर एक्सेस बटन दबाएं।");
          }

          const createData = await createResponse.json();
          if (createData.detail) throw new Error(createData.detail);
          
          const predictionId = createData.id;
          let status = createData.status;
          
          while (status === 'starting' || status === 'processing') {
            setStatusText(`AI is working: ${status === 'starting' ? 'Starting up...' : 'Generating Video Frames...'}`);
            await new Promise(resolve => setTimeout(resolve, 5000));
            
            const checkResponse = await fetch(`${PROXY_URL}https://api.replicate.com/v1/predictions/${predictionId}`, {
              headers: { 
                'Authorization': `Token ${REPLICATE_API_KEY}`,
                'X-Requested-With': 'XMLHttpRequest'
              }
            });
            const checkData = await checkResponse.json();
            status = checkData.status;
            
            if (status === 'succeeded') {
              const output = checkData.output;
              setVideoUrl(Array.isArray(output) ? output[0] : output);
              setIsGenerating(false);
              return;
            } else if (status === 'failed' || status === 'canceled') {
              throw new Error("Video generation failed on Replicate server.");
            }
          }
        } catch (error) {
          console.error(error);
          alert("Error: " + error.message);
          setIsGenerating(false);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900/20 to-black p-4">
          {sidebarOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}
          
          <Sidebar />
          
          <main className="lg:ml-64 p-4 lg:p-8 max-w-6xl mx-auto pt-20 lg:pt-8">
            <div className="flex flex-col lg:flex-row gap-8">
              <div className="lg:w-1/2 space-y-8">
                <PromptInput
                  prompt={prompt}
                  onPromptChange={setPrompt}
                  onGenerate={handleGenerate}
                  isGenerating={isGenerating}
                />
              </div>
              
              <div className="lg:w-1/2">
                <VideoPreview 
                  isGenerating={isGenerating}
                  videoUrl={videoUrl}
                  statusText={statusText}
                />
              </div>
            </div>
          </main>

          <button
            className="fixed top-4 left-4 z-50 lg:hidden p-3 bg-gray-800/90 backdrop-blur-sm rounded-2xl border border-gray-700 shadow-2xl hover:bg-white/10 transition-all duration-200 cursor-pointer"
            onClick={() => setSidebarOpen(!sidebarOpen)}
          >
            <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      );
    };

    const App = () => (
      <div className="min-h-screen overflow-y-auto">
        <MainApp />
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
